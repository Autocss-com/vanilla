<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style> :root{color-scheme:light dark;font-family:system-ui,sans-serif} body{margin:1rem} </style>
  <link rel="stylesheet" href="../assets/css/gallery.css" />
  <title>gallery filter drop-in test</title>
</head>
<body>
  <!-- Exact <template>-pool markup for a gallery composite. -->
  <app-gallery>
    <fieldset>
      <label><input type="radio" name="gallery-filter" value="all" aria-hidden="true" checked />All</label>
      <label><input type="radio" name="gallery-filter" value="ballet" aria-hidden="true" />Ballet</label>
      <label><input type="radio" name="gallery-filter" value="jazz" aria-hidden="true" />Jazz</label>
      <label><input type="radio" name="gallery-filter" value="tap" aria-hidden="true" />Tap</label>
      <label><input type="radio" name="gallery-filter" value="contemporary" aria-hidden="true" />Contemporary</label>
    </fieldset>
    <cat-ballet><img src="https://picsum.photos/seed/b1/400/400" alt="Ballet 1" /></cat-ballet>
    <cat-ballet><img src="https://picsum.photos/seed/b2/400/400" alt="Ballet 2" /></cat-ballet>
    <cat-ballet><img src="https://picsum.photos/seed/b3/400/400" alt="Ballet 3" /></cat-ballet>
    <cat-jazz><img src="https://picsum.photos/seed/j1/400/400" alt="Jazz 1" /></cat-jazz>
    <cat-jazz><img src="https://picsum.photos/seed/j2/400/400" alt="Jazz 2" /></cat-jazz>
    <cat-tap><img src="https://picsum.photos/seed/t1/400/400" alt="Tap 1" /></cat-tap>
    <cat-tap><img src="https://picsum.photos/seed/t2/400/400" alt="Tap 2" /></cat-tap>
    <cat-contemporary><img src="https://picsum.photos/seed/c1/400/400" alt="Contemporary 1" /></cat-contemporary>
    <cat-contemporary><img src="https://picsum.photos/seed/c2/400/400" alt="Contemporary 2" /></cat-contemporary>
    <cat-contemporary><img src="https://picsum.photos/seed/c3/400/400" alt="Contemporary 3" /></cat-contemporary>
  </app-gallery>
</body>
</html>

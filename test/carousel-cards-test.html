<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- test-only shim: in the real app, layout.css makes a populated <section> a grid.
       Provided here so the drop-in component CSS is exercised in isolation. -->
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { margin: 0; }
    section { display: grid; }
    section:empty { display: none; }
  </style>
  <link rel="stylesheet" href="../assets/css/cards.css" />
  <link rel="stylesheet" href="../assets/css/carousel.css" />
  <title>carousel + cards drop-in test</title>
</head>
<body>
  <main>
    <article>
      <!-- SECTION 1: carousel (the exact markup the <template> pool must contain) -->
      <section>
        <app-carousel>
          <figure>
            <app-snapper></app-snapper>
            <img src="https://picsum.photos/seed/s1/1600/900" alt="Slide one" />
            <figcaption><h1>Where dancers take flight</h1><p>Classical training for every level.</p></figcaption>
          </figure>
          <figure>
            <app-snapper></app-snapper>
            <img src="https://picsum.photos/seed/s2/1600/900" alt="Slide two" />
            <figcaption><h1>Small classes, real attention</h1><p>No more than twelve per class.</p></figcaption>
          </figure>
          <figure>
            <app-snapper></app-snapper>
            <img src="https://picsum.photos/seed/s3/1600/900" alt="Slide three" />
            <figcaption><h1>Perform on a real stage</h1><p>Two productions a year.</p></figcaption>
          </figure>
        </app-carousel>
      </section>

      <!-- SECTION 2: cards -->
      <section>
        <app-card><h2>Trained to thrive</h2><p>A graded classical syllabus that builds strength and confidence.</p></app-card>
        <app-card><h2>A studio that feels like home</h2><p>Sprung floors, natural light, faculty who know your name.</p></app-card>
      </section>
    </article>
  </main>
</body>
</html>

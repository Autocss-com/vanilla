<!doctype html>
<html lang="en-us">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="D7460N" />
  <meta name="description" content="Étoile Ballet Studio — AutoCSS remote-rendering demo (data-driven, read-only)" />
  <meta name="color-scheme" content="light dark" />

  <!-- Base AutoCSS layers (order = the @layer cascade; foundational first = lowest priority). -->
  <link rel="stylesheet" href="./assets/css/reset.css" />
  <link rel="stylesheet" href="./assets/css/fonts.css" />
  <link rel="stylesheet" href="./assets/css/color-scheme.css" />
  <link rel="stylesheet" href="./assets/css/color-theme-66ccff.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/inputs.css" />
  <link rel="stylesheet" href="./assets/css/media.css" />
  <link rel="stylesheet" href="./assets/css/typography.css" />
  <link rel="stylesheet" href="./assets/css/scrolling.css" />
  <link rel="stylesheet" href="./assets/css/a11y.css" />
  <link rel="stylesheet" href="./assets/css/forms.css" />
  <link rel="stylesheet" href="./assets/css/fallbacks.css" />
  <link rel="stylesheet" href="./assets/css/loading.css" />
  <!-- Marketing composites (drop-ins; after layout so they own their custom elements). -->
  <link rel="stylesheet" href="./assets/css/cards.css" />
  <link rel="stylesheet" href="./assets/css/carousel.css" />
  <link rel="stylesheet" href="./assets/css/gallery.css" />
  <link rel="stylesheet" href="./assets/css/contact.css" />

  <title>Étoile Ballet Studio</title>
</head>

<body>
  <app-container>
    <app-banner></app-banner>
    <header>
      <app-logo></app-logo>
      <label aria-label="Light color scheme">
        &#9788; Light
        <input type="radio" aria-hidden="true" name="color-scheme" value="light" />
      </label>
      <label aria-label="Dark color scheme">
        &#9790; Dark
        <input type="radio" aria-hidden="true" name="color-scheme" value="dark" />
      </label>
      <label aria-label="System color scheme">
        &#9680; System
        <input type="radio" aria-hidden="true" name="color-scheme" value="system" checked />
      </label>
    </header>
    <nav>
      <details open>
        <summary></summary>
        <section>
          <label><input type="radio" aria-hidden="true" name="nav" value="home" /></label>
          <label><input type="radio" aria-hidden="true" name="nav" value="classes" /></label>
          <label><input type="radio" aria-hidden="true" name="nav" value="about" /></label>
          <label><input type="radio" aria-hidden="true" name="nav" value="faculty" /></label>
          <label><input type="radio" aria-hidden="true" name="nav" value="tuition" /></label>
        </section>
      </details>
    </nav>
    <main>
      <article>
        <h1></h1>
        <p></p>
        <!-- 4 content regions (layout only, no padding/margin); empty ones hide via CSS. -->
        <section></section>
        <section></section>
        <section></section>
        <section></section>
        <!-- Classes tab: search + the AutoCSS ul/li table. -->
        <input type="search" placeholder="Filter by name..." name="filter" />
        <ul aria-hidden="true">
          <li></li>
        </ul>
        <ul></ul>
      </article>
    </main>
    <aside>
      <h2 aria-live="polite">DETAILS</h2>
      <label role="button" aria-label="Close">
        <input type="checkbox" />
        &#10006;
      </label>
      <form>
        <fieldset></fieldset>
        <p aria-live="polite"></p>
      </form>
    </aside>
    <footer>
      <app-legal></app-legal>
      <app-version></app-version>
    </footer>
    <app-banner></app-banner>
  </app-container>

  <!-- Content-element pool (inert): the content branch clones from here by tag. -->
  <template>
    <h1></h1><h2></h2><h3></h3><p></p><blockquote></blockquote>
    <app-card><h2></h2><p></p></app-card>
    <app-carousel>
      <figure>
        <app-snapper></app-snapper>
        <img />
        <figcaption><h1></h1><p></p></figcaption>
      </figure>
    </app-carousel>
  </template>

  <script type="module" src="./assets/js/app.js"></script>
</body>

</html>
